<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yinic3934-star 個人網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #764ba2;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .content {
            margin: 30px 0;
            text-align: left;
        }
        
        .content p {
            margin: 15px 0;
            color: #555;
            font-size: 1.1em;
        }
        
        .links {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        .emoji {
            font-size: 1.2em;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="emoji">🚀</span>yinic3934-star</h1>
        <div class="subtitle">歡迎來到我的個人網站</div>
        
        <div class="content">
            <p><span class="emoji">👋</span>嗨！我是 yinic3934-star</p>
            <p><span class="emoji">💻</span>這是我的 GitHub Pages 個人網站</p>
            <p><span class="emoji">🎯</span>在這裡你可以了解更多關於我的項目和工作</p>
        </div>
        
        <div class="links">
            <a href="https://github.com/yinic3934-star" class="btn"><span class="emoji">🐙</span>GitHub 主頁</a>
            <a href="https://github.com/yinic3934-star/-" class="btn"><span class="emoji">📁</span>查看倉庫</a>
        </div>
        
        <div class="footer">
            <p>✨ 由 yinic3934-star 創建 | 2026</p>
        </div>
    </div>
</body>
</html>
